name: Deploy Staging

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'eu-west-2' }}

      # ── Database migration ────────────────────────────────────────────────
      # Pushes the Drizzle schema to Neon before deploying infrastructure.
      # Remove or gate this step if you need manual migration control.
      - name: Push database schema (db:push)
        run: cd packages/db && bun run db:push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # ─────────────────────────────────────────────────────────────────────

      - name: Deploy
        run: bunx sst deploy --stage staging
